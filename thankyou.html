<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | RAF Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #11131a;
      --text: #ffffff;
      --muted: #a8b0c0;
      --accent: #ff2d2d;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 12px;
      color: var(--accent);
      font-weight: 800;
    }

    .subtitle {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.6;
    }

    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      text-align: left;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .code-box {
      background: #0b0d12;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    .download-btn,
    .back-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      transition: 0.2s ease;
      margin-top: 12px;
    }

    .download-btn {
      background: var(--accent);
      color: white;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .back-btn {
      background: transparent;
      color: white;
      border: 1px solid var(--border);
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.04);
    }

    .small-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 10px;
    }

    .video-box {
      margin-top: 10px;
      padding: 16px;
      border-radius: 14px;
      background: #0b0d12;
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .card {
        padding: 22px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 16px;
      }

      .code-box {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You For Your Purchase</h1>
    <p class="subtitle">
      Your RAF Program is ready below.
    </p>

    <div class="section">
      <div class="section-title">Your PDF Password</div>
      <p class="small-text">Use this password to open your RAF Program PDF:</p>
      <div class="code-box">RAF2026fit!</div>
    </div>

    <div class="section">
      <div class="section-title">Download Your PDF</div>
      <p class="small-text">
        Click the button below to open or download your program.
      </p>

      <a class="download-btn" href="./RAF%20Program.pdf" target="_blank">
        Open RAF Program PDF
      </a>
    </div>

    <div class="section">
      <div class="section-title">Video Access</div>
      <div class="video-box">
        Here is the explaining video.
      </div>
    </div>

    <a class="back-btn" href="index.html">Back To Home</a>
  </div>
  
</body>
</html>
