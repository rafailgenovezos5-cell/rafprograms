<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | RAF Program</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --card: #11131a;
      --text: #ffffff;
      --muted: #a8b0c0;
      --accent: #ff2d2d;
      --border: rgba(255,255,255,0.08);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 25px;
    }

    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      text-align: left;
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .code-box {
      background: #0b0d12;
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    .btn {
      display: block;
      text-align: center;
      padding: 14px;
      border-radius: 12px;
      margin-top: 10px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      border: 1px solid var(--border);
      color: white;
      background: transparent;
    }

    iframe {
      width: 100%;
      height: 315px;
      border: 0;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Thank You For Your Purchase</h1>
    <p class="subtitle">Your RAF Program is ready below.</p>

    <div class="section">
      <div class="section-title">PDF Password</div>
      <div class="code-box">RAF2026fit!</div>
    </div>

    <div class="section">
      <div class="section-title">Download Program</div>
      <a class="btn primary" href="./RAF%20Program.pdf" target="_blank">
        Open PDF
      </a>
    </div>

    <div class="section">
      <div class="section-title">Video Access</div>
      <iframe src="https://www.youtube.com/embed/l7SGQVMtLNg" allowfullscreen></iframe>
    </div>

    <a class="btn secondary" href="index.html">Back To Home</a>
  </div>

</body>
</html>
